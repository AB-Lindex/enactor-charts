name: CI

# Validate charts on every branch push (except main) and on PRs into main.
# The release workflow (release.yml) still runs separately on push to main.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: chart-testing lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      # Lints changed charts (helm lint + Chart.yaml schema) and enforces a
      # chart-version bump vs main — the guard against an unbumped version being
      # silently skipped by chart-releaser on merge.
      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml

  unittest:
    name: helm unittest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.4

      # helm 4 verifies plugins by default; --verify=false skips it (the flag does
      # not exist on helm 3). helm-unittest 1.1.1 needs helm >= 3.18 (platformHooks).
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1 --verify=false

      # Snapshot + assertion tests. --with-subchart=false keeps the run offline
      # (no need to pull the bitnami mariadb subchart's own tests).
      - name: Run unit tests
        run: helm unittest --with-subchart=false charts/enactor-em
