suite: enactor-em statefulsets
# The configmaps are listed so the checksum/* annotation includes in
# statefulset.yaml resolve; each test scopes back to statefulset.yaml.
templates:
  - templates/statefulset.yaml
  - templates/configmap-common.yaml
  - templates/configmap-ema.yaml
  - templates/configmap-emp.yaml
  - templates/configmap-ems.yaml
  - templates/configmap-tms.yaml
  - templates/configmap-emr.yaml
release:
  name: em
  namespace: em
set:
  storage.storageClass: test-sc
  dns.domain: test.example
tests:
  - it: renders one StatefulSet per component
    template: templates/statefulset.yaml
    asserts:
      - hasDocuments:
          count: 5

  - it: ema uses the image.repository registry root
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: ema
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^registry\\.example\\.com/enactor/ema:"

  - it: a component can override its registry root via components.<c>.repository
    template: templates/statefulset.yaml
    set:
      components.emr.repository: other.example.com/custom
    documentSelector:
      path: metadata.name
      value: emr
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^other\\.example\\.com/custom/emr:"

  - it: tms exposes both http and rmi container ports
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: tms
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: rmi
            containerPort: 39851
            protocol: TCP

  - it: emp waits on the database before starting
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: emp
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: HOST
            value: em-db
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: PORT
            value: "3306"

  - it: ema waits on emp before starting
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: ema
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: HOST
            value: emp
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: PORT
            value: "39832"

  - it: defaults ENACTOR_RMI_SERVERHOST to the pod IP when rmiServerHost is unset
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: emp
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENACTOR_RMI_SERVERHOST
            valueFrom:
              fieldRef:
                fieldPath: status.podIP

  - it: components.<c>.rmiServerHost overrides ENACTOR_RMI_SERVERHOST with a literal value
    template: templates/statefulset.yaml
    set:
      components.emp.rmiServerHost: 10.16.2.20
    documentSelector:
      path: metadata.name
      value: emp
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENACTOR_RMI_SERVERHOST
            value: "10.16.2.20"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENACTOR_RMI_SERVERHOST
            valueFrom:
              fieldRef:
                fieldPath: status.podIP

  - it: defaults replicas to 1 when components.<c>.replicas is unset
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: ema
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: components.<c>.replicas overrides the replica count
    template: templates/statefulset.yaml
    set:
      components.ema.replicas: 3
    documentSelector:
      path: metadata.name
      value: ema
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: components.<c>.tag overrides the image tag
    template: templates/statefulset.yaml
    set:
      components.ema.tag: "1.2.3"
    documentSelector:
      path: metadata.name
      value: ema
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":1\\.2\\.3$"

  - it: components.<c>.resources overrides the global resources block
    template: templates/statefulset.yaml
    set:
      components.emp.resources:
        requests:
          cpu: 500m
          memory: 1Gi
    documentSelector:
      path: metadata.name
      value: emp
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 500m
              memory: 1Gi

  - it: components.<c>.storage.size overrides the apphome PVC size
    template: templates/statefulset.yaml
    set:
      components.emp.storage.size: 50Gi
    documentSelector:
      path: metadata.name
      value: emp
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 50Gi

  - it: apphome PVC size defaults to storage.size when unset
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: ema
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 25Gi

  - it: global extraEnv is applied to every component
    template: templates/statefulset.yaml
    set:
      extraEnv:
        - name: ENACTOR_LOG_LEVEL
          value: DEBUG
    documentSelector:
      path: metadata.name
      value: ems
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENACTOR_LOG_LEVEL
            value: DEBUG

  - it: components.<c>.extraEnv adds vars to that component only
    template: templates/statefulset.yaml
    set:
      components.emp.extraEnv:
        - name: EMP_ONLY
          value: "1"
    documentSelector:
      path: metadata.name
      value: emp
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EMP_ONLY
            value: "1"

  - it: components.<c>.extraEnv does not leak to other components
    template: templates/statefulset.yaml
    set:
      components.emp.extraEnv:
        - name: EMP_ONLY
          value: "1"
    documentSelector:
      path: metadata.name
      value: ema
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: EMP_ONLY
            value: "1"

  # env: entries override envFrom: sources of the same name (Kubernetes rule),
  # so an extraEnv override of a configmap key (here config-emp's ENACTOR_MAXTHREADS)
  # must render into the container env: list to actually take effect.
  - it: "extraEnv overriding a configmap key lands in env so it wins over envFrom"
    template: templates/statefulset.yaml
    set:
      components.emp.extraEnv:
        - name: ENACTOR_MAXTHREADS
          value: "500"
    documentSelector:
      path: metadata.name
      value: emp
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENACTOR_MAXTHREADS
            value: "500"

  - it: selector stays on the component name (immutable field must not drift)
    template: templates/statefulset.yaml
    documentSelector:
      path: metadata.name
      value: ems
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: ems

  - it: matches the rendered snapshot
    template: templates/statefulset.yaml
    asserts:
      - matchSnapshot: {}
