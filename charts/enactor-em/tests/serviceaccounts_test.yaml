suite: enactor-em service accounts
templates:
  - templates/serviceaccounts.yaml
release:
  name: em
  namespace: em
tests:
  - it: renders one ServiceAccount per component by default
    asserts:
      - hasDocuments:
          count: 5

  - it: renders nothing when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: matches the rendered snapshot
    asserts:
      - matchSnapshot: {}
