{{- if .Values.ingress.emp.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "emp.name" . }}
  labels:
    {{- include "emp.labels" . | nindent 4 }}
  {{- with .Values.ingress.emp.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- range .Values.ingress.emp.paths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "emp.name" $ }}
                port:
                  name: http
          {{- end }}
{{- end }}
