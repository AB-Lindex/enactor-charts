{{ $image := printf "%s/%s" .Values.image.repository .Values.image.ema | clean }}
{{ $name := include "ema.name" . }}
{{ $dependency := dict "dependsOn" .Values.global.dependsOn "service" (include "ems.name" .) "port" (include "ems.http.port" .) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ema.name" . }}
  labels:
    {{- include "ema.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ema.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "ema.name" . }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      annotations:
        checksum/common: {{ include (print $.Template.BasePath "/configmap-common.yaml") . | sha256sum }}
        checksum/ema: {{ include (print $.Template.BasePath "/configmap-ema.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ema.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ema.name" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 300

      # volumes:
      #   - name: app-home
      #     emptyDir: {}

      initContainers:
        {{ include "dependsOn" $dependency | nindent 8 }}

      containers:
        - name: ema
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ $image }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{ include "db.env" . | nindent 12 }}

            - name: ENACTOR_JMX_SERVERHOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
                  
            - name: ENACTOR_RMI_SERVERHOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

            - name: ENACTOR_JMX_APPLICATIONID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
                
          envFrom:
            - configMapRef:
                name: config-common
            - configMapRef:
                name: config-{{ include "ema.name" . }}
            - secretRef:
                name: secret-common
          ports:
            - name: http
              containerPort: 39830
              protocol: TCP
          # WebMaintenance responds with an auth/session redirect chain that an
          # httpGet probe would follow past its 10-redirect limit and fail, so
          # (as enactor-pdp does) we check the port is listening instead.
          livenessProbe:
            tcpSocket:
              port: http
            timeoutSeconds: 5
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            timeoutSeconds: 5
            periodSeconds: 15
            failureThreshold: 5
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
            initialDelaySeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: apphome
              mountPath: /enactor/app/home

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: apphome
      spec:
        storageClassName: {{ .Values.storage.storageClass }}
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.storage.size }}

