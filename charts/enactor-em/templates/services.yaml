apiVersion: v1
kind: Service
metadata:
  name: {{ include "ema.name" . }}
  labels:
    {{- include "ema.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- include "service.ports" .Values.network.ema | nindent 4 }}
  selector:
    {{- include "ema.selectorLabels" . | nindent 4 }}
