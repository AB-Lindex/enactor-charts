apiVersion: v1
kind: ConfigMap
metadata:
  name: config-{{ include "ems.name" . }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
data:
  ENACTOR_CROSS_DOMAIN_ORIGIN: "*"
  ENACTOR_JMX_APPLICATIONID: ServicesServer
  ENACTOR_RMI_SERVERHOST: {{ include "ems.name" . }}

  ENACTOR_REST_AUTHENTICATERESTAPI: "true"
  ENACTOR_RESTAPI_DEVICEID: RestApi@S001.enactor
  ENACTOR_RESTAPI_CUSTOMERUSER: CUST_USER
  ENACTOR_RESTAPI_PAYMENTS_DEMO_MODE: "true"

  JMPS: 128m
  JXMS: 512m
  JXMX: 768m
