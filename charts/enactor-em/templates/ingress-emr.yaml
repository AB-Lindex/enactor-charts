{{- if .Values.ingress.emr.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "emr.name" . }}
  labels:
    {{- include "emr.labels" . | nindent 4 }}
  {{- with .Values.ingress.emr.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.emr.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "emr.name" . }}
                port:
                  name: http
{{- end }}
