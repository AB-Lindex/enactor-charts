# Default values for enactor-em.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  # Registry + repository prefix; the per-component image name (components.<c>.image)
  # is appended to this — or to stdRepository when components.<c>.stdRepo is true.
  repository: lindexacrdev.azurecr.io/commerce/enactorpos
  # TMS/EMR live under a different registry root than ema/emp/ems.
  stdRepository: lindexacrdev.azurecr.io/enactorstandard/lin
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

imagePullSecrets:
  - name: pullsecret
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  # The EM images run as uid/gid 1100 (tomcat_admin/tomcat), so the mounted
  # apphome PVC must be group-owned by 1100 for the app to write to it.
  fsGroup: 1100

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: http

network:
  ema:
    http: 39830
  emp:
    http: 39832
    jmx: 39847
    jmx1: 39848
    jmx2: 39849
    jmx3: 39850
    jmx4: 39851
  ems:
    http: 39833
  tms:
    http: 39888
    rmi: 39851
  emr:
    http: 39831

# Per-component definitions. The generic templates (statefulset.yaml, services.yaml,
# serviceaccounts.yaml) range over this map, one StatefulSet/Service/ServiceAccount
# per entry. Only the values that vary between components live here; everything else
# is inlined once in statefulset.yaml. Port numbers still come from `network` above.
#   image       - image name appended to image.repository (or image.stdRepository if stdRepo)
#   stdRepo     - true selects image.stdRepository instead of image.repository
#   dependsOn   - init-container wait target: either {component: <name>} (waits on that
#                 component's http port) or a literal {service: <name>, port: <n>}
#   containerPorts - port names (keyed into network.<component>) to expose as containerPorts
#   probes      - raw liveness/readiness/startup probe blocks, rendered verbatim
components:
  ema:
    image: lindexextension-ema
    dependsOn:
      component: ems
    containerPorts:
      - http
    probes:
      # WebMaintenance responds with an auth/session redirect chain that an
      # httpGet probe would follow past its 10-redirect limit and fail, so
      # (as enactor-pdp does) we check the port is listening instead.
      livenessProbe:
        tcpSocket:
          port: http
        timeoutSeconds: 5
        periodSeconds: 15
        failureThreshold: 5
      readinessProbe:
        tcpSocket:
          port: http
        timeoutSeconds: 5
        periodSeconds: 15
        failureThreshold: 5
      startupProbe:
        tcpSocket:
          port: http
        periodSeconds: 10
        failureThreshold: 30
        initialDelaySeconds: 20
  emp:
    image: lindexextension-emp
    dependsOn:
      service: em-db
      port: 3306
    containerPorts:
      - http
    probes:
      livenessProbe:
        httpGet:
          path: /WebCore/
          port: http
      readinessProbe:
        httpGet:
          path: /WebCore/
          port: http
      startupProbe:
        httpGet:
          path: /WebCore/
          port: http
        periodSeconds: 10
        failureThreshold: 10
        initialDelaySeconds: 20
  ems:
    image: lindexextension-ems
    dependsOn:
      component: emp
    containerPorts:
      - http
    probes:
      livenessProbe:
        httpGet:
          path: /axis2/
          port: http
      readinessProbe:
        httpGet:
          path: /axis2/
          port: http
      startupProbe:
        httpGet:
          path: /axis2/
          port: http
        periodSeconds: 20
        failureThreshold: 10
        initialDelaySeconds: 20
  tms:
    stdRepo: true
    image: tms
    dependsOn:
      component: emp
    containerPorts:
      - http
      - rmi
    probes:
      # TMS has no healthcheck in the compose reference, so check the port
      # is listening rather than guess a working URL (as ema does).
      livenessProbe:
        tcpSocket:
          port: http
        timeoutSeconds: 5
        periodSeconds: 15
        failureThreshold: 5
      readinessProbe:
        tcpSocket:
          port: http
        timeoutSeconds: 5
        periodSeconds: 15
        failureThreshold: 5
      startupProbe:
        tcpSocket:
          port: http
        periodSeconds: 10
        failureThreshold: 30
        initialDelaySeconds: 20
  emr:
    stdRepo: true
    image: emr
    dependsOn:
      component: emp
    containerPorts:
      - http
    probes:
      livenessProbe:
        httpGet:
          path: /WebReports/
          port: http
      readinessProbe:
        httpGet:
          path: /WebReports/
          port: http
      startupProbe:
        httpGet:
          path: /WebReports/
          port: http
        periodSeconds: 20
        failureThreshold: 10
        initialDelaySeconds: 20

dns:
  domain: my.fqdn.address
  ema: ema
  ems: ems
  emp: emp
  tms: tms
  emr: emr

ingress:
  # Exposes the EMA web UI (WebMaintenance). EMP/EMS are reached over cluster
  # DNS. TLS is terminated by the nginx ingress controller, so no tls block is
  # needed here. EMR's WebReports UI can be exposed on the same host via the
  # `emr` sub-block below; it is independently toggleable.
  enabled: false
  className: nginx
  host: store-qa.lindex.to
  path: /WebMaintenance
  annotations: {}
  # Exposes EMR's WebReports UI on the same host/className/annotations as above.
  emr:
    enabled: false
    path: /WebReports

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

storage:
  size: "25Gi"
  storageClass: ""

# Additional raw manifests to render as-is (e.g. per-environment SealedSecrets
# for em-secrets / secret-common). See templates/extra-manifests.yaml.
extraObjects: []

# Thirdparty Configuration
mariadb:
  image:
    registry: docker.io
    repository: bitnamilegacy/mariadb
    tag: 10.6.20-debian-12-r1
  fullnameOverride: "em-db"
  deploy: true
  auth:
    database: "enactorem"
    username: "enactor"
    existingSecret: em-secrets
  primary:
    persistence:
      size: "25Gi"
      storageClass: ""
    configuration: |
      [mysqld]
      skip-name-resolve
      explicit_defaults_for_timestamp
      basedir=/opt/bitnami/mariadb
      plugin_dir=/opt/bitnami/mariadb/plugin
      port=3306
      socket=/opt/bitnami/mariadb/tmp/mysql.sock
      tmpdir=/opt/bitnami/mariadb/tmp
      max_allowed_packet=16M
      bind-address=*
      pid-file=/opt/bitnami/mariadb/tmp/mysqld.pid
      log-error=/opt/bitnami/mariadb/logs/mysqld.log

      slow_query_log=0
      slow_query_log_file=/opt/bitnami/mariadb/logs/mysqld.log
      long_query_time=10.0

      character-set-server  = utf8mb4
      collation-server      = utf8mb4_general_ci
      transaction_isolation = READ-COMMITTED
      lower_case_table_names = 1

      [client]
      port=3306
      socket=/opt/bitnami/mariadb/tmp/mysql.sock
      default-character-set=UTF8
      plugin_dir=/opt/bitnami/mariadb/plugin

      [manager]
      port=3306
      socket=/opt/bitnami/mariadb/tmp/mysql.sock
      pid-file=/opt/bitnami/mariadb/tmp/mysqld.pid

global:    
  dependsOn:
    imagePullPolicy: IfNotPresent
    image: busybox
    tag: "1.31"
    command:
      - sh
      - -c
      - |-
        sleep $INTERVAL;
        echo -e "Checking for the availability of '$HOST' on port $PORT";
        while ! nc -z $HOST $PORT;
          do sleep $INTERVAL;
          printf "-";
        done;
        echo -e "  >> Service '$HOST' has started";
    resources:
      requests:
        cpu: '10m'
        memory: '20Mi'
      limits:
        cpu: '50m'
        memory: '200Mi'
    securityContext: {}
